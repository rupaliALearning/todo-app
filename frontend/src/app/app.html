<div class="container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>TODO List</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <app-add-todo (todoAdded)="onTodoAdded($event)" 
      (deleteAllCompleted)="onDeleteAllCompleted()"
      [hasCompleted]="hasCompleted()" />

      <app-todo-list
        [todos]="todos()"
        (deleteTodo)="onTodoDeleted($event)"
        (updateCompleted)="onUpdateCompleted($event)"        
      />
    </mat-card-content>
  </mat-card>
</div>
