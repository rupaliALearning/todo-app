<div class="add-todo">
  @if (errorMessage()) {
    <mat-error>{{ errorMessage() }}</mat-error>
  }
  <div class="form-row">
    <mat-form-field appearance="outline" class="title-field">
      <mat-label>TODO <span class="required">*</span></mat-label>
      <input
        matInput
        [(ngModel)]="title"
        placeholder="Add a new TODO..."
        maxlength="500"
      />
      <mat-hint align="end">{{ title().length }}/500</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline" class="date-field">
      <mat-label>Due Date</mat-label>
      <input matInput [matDatepicker]="picker" [(ngModel)]="dueDate" />
      <mat-datepicker-toggle matSuffix [for]="picker" />
      <mat-datepicker #picker />
    </mat-form-field>    
  </div>
  <div class="action-row">
    <button mat-raised-button color="primary" (click)="onAdd()">
      <mat-icon>add</mat-icon>
      Add
    </button>

    @if (hasCompleted()) {
        <button mat-flat-button class="warn-btn" (click)="onDeleteAllCompleted()">
            <mat-icon>delete_sweep</mat-icon>
            Delete All Completed
        </button>
    }
  </div>

</div>
